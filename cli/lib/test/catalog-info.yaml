apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: service-discover-test-lib
  title: Service Discover Test Library
  description: |
    A library which allows testing with test containers.
    Spins up Carbonio Ldap, launches a Carbonio LDAP instance with the desired version.
    It provides the LDAP instance context and the container itself.
  annotations:
    backstage.io/techdocs-ref: dir:.
  tags:
    - service-discover
    - cli
    - lib
    - library
    - test
    - testcontainers
    - consul
    - go
    - backend
spec:
  type: library
  lifecycle: production
  owner: new-bacon-monsters