# Disable some built-in rules
config:
  no-inline-html: false
  MD013:
    line_length: 120
    code_block_line_length: 120

ignores:
  - "*.autogen.md"

# Disable inline config comments
noInlineConfig: true

# Use a specific formatter
outputFormatters:
  -
    - markdownlint-cli2-formatter-default
